# Default values for pdf.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: stirlingtools/stirling-pdf
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 1000

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  nodePort: null

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: pdf.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  

# Resources configuration
resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Liveness and readiness probes
startupProbe:
  httpGet:
    path: /login
    port: 8080
  failureThreshold: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /login
    port: 8080
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /login
    port: 8080
  periodSeconds: 10
  failureThreshold: 3



# Environment variables
env:
  # General settings
  LOG_LEVEL: "INFO"
  # Stirling PDF specific settings
  JAVA_OPTS: "-Xmx1024m"

nodeSelector: {}

tolerations: []

affinity: {}

# Persistence configuration
persistence:
  enabled: false
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  # If you want to use an existing claim
  existingClaim: ""
